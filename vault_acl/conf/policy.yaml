# ══════════════════════════════════════════════════════════════════════
#  Vault ACL Policy — Конфигурация управления доступом
# ══════════════════════════════════════════════════════════════════════
#
#  Этот файл описывает ВСЕ права доступа к файлам Obsidian-хранилища.
#  Формат: YAML.  Загружается через vault_acl.loader.load_policy().
#
#  Доступные permissions:
#    read   — чтение файла
#    write  — изменение содержимого файла
#    delete — удаление файла
#    create — создание новых файлов в папке
#    all    — все четыре права сразу
#
#  Паттерны путей (glob):
#    *        — любое имя файла/папки на одном уровне
#    **       — рекурсивно любые вложенные уровни
#    ?        — один любой символ
#    [abc]    — один символ из набора
#
#  Система приоритетов (от слабого к сильному):
#    1. Specificity паттерна (exact > deep path > wildcards)
#    2. Числовой priority (чем больше — тем сильнее)
#    3. deny wins — при равных условиях запрет перевешивает разрешение
#
# ══════════════════════════════════════════════════════════════════════


# ── Глобальная настройка ─────────────────────────────────────────────
# Если для файла не нашлось ни одного подходящего правила —
# default_deny: true  → доступ закрыт (принцип наименьших привилегий)
# default_deny: false → доступ открыт (не рекомендуется для продакшена)
default_deny: true


# ── Роли и их участники ─────────────────────────────────────────────
# Каждый пользователь может состоять в нескольких ролях.
# Имена ролей произвольные — вы сами решаете, какие роли нужны.
roles:
  # Полный доступ ко всему хранилищу
  admin:
    - alice

  # Может читать и редактировать большинство файлов
  editor:
    - bob
    - charlie

  # Может только читать
  viewer:
    - dave
    - eve

  # Менеджер проектов — доступ к проектной документации
  project_manager:
    - frank
    - charlie    # charlie одновременно editor И project_manager

  # HR — доступ к кадровым документам
  hr:
    - grace


# ══════════════════════════════════════════════════════════════════════
#  Правила доступа
# ══════════════════════════════════════════════════════════════════════
#
#  Каждое правило содержит:
#    pattern:      glob-паттерн пути файла
#    permissions:  список прав [read, write, delete, create, all]
#    priority:     числовой приоритет (по умолчанию 0)
#    deny:         true = запрет, false = разрешение  (по умолчанию false)
#    roles:        список ролей, к которым применяется правило
#    users:        список конкретных пользователей
#
#  roles и users можно комбинировать: правило сработает, если
#  пользователь совпал ИЛИ имеет нужную роль.
#
# ══════════════════════════════════════════════════════════════════════

rules:

  # ────────────────────────────────────────────────────────────────────
  #  1. БАЗОВЫЕ РОЛЕВЫЕ ПРАВИЛА (низкий приоритет)
  #     Определяют «фундамент» доступа для каждой роли.
  # ────────────────────────────────────────────────────────────────────

  # Админы — полный доступ ко всему хранилищу
  - pattern: "**/*"
    roles: [admin]
    permissions: [all]
    priority: 100

  # Редакторы — чтение и запись по всему хранилищу
  - pattern: "**/*"
    roles: [editor]
    permissions: [read, write]
    priority: 50

  # Зрители — только чтение по всему хранилищу
  - pattern: "**/*"
    roles: [viewer]
    permissions: [read]
    priority: 10


  # ────────────────────────────────────────────────────────────────────
  #  2. ОГРАНИЧЕНИЯ ПО ПАПКАМ (средний приоритет)
  #     Запрет доступа к целым разделам хранилища.
  # ────────────────────────────────────────────────────────────────────

  # Секретные документы — полностью закрыты для редакторов и зрителей
  - pattern: "secrets/**"
    roles: [editor, viewer]
    permissions: [all]
    deny: true
    priority: 60

  # Кадровые документы — закрыты для всех кроме admin и hr
  - pattern: "hr/**"
    roles: [editor, viewer, project_manager]
    permissions: [all]
    deny: true
    priority: 60

  # HR-роль получает полный доступ к кадровым документам
  - pattern: "hr/**"
    roles: [hr]
    permissions: [all]
    priority: 70


  # ────────────────────────────────────────────────────────────────────
  #  3. ТОЧЕЧНЫЕ ПРАВИЛА ДЛЯ КОНКРЕТНЫХ ПАПОК
  # ────────────────────────────────────────────────────────────────────

  # Менеджеры проектов — полный доступ к проектной документации
  - pattern: "projects/**"
    roles: [project_manager]
    permissions: [all]
    priority: 55

  # Редакторы могут создавать файлы в папке drafts
  - pattern: "drafts/**"
    roles: [editor]
    permissions: [create]
    priority: 55

  # Зрители могут создавать файлы только в своей «inbox» папке
  - pattern: "inbox/**"
    roles: [viewer]
    permissions: [create, write]
    priority: 55


  # ────────────────────────────────────────────────────────────────────
  #  4. ЗАЩИТА DAILY NOTES (запрет удаления)
  #     Даже редакторы не должны удалять daily notes.
  # ────────────────────────────────────────────────────────────────────

  - pattern: "daily/*.md"
    roles: [editor]
    permissions: [delete]
    deny: true
    priority: 70


  # ────────────────────────────────────────────────────────────────────
  #  5. ПАТТЕРНЫ ПО ИМЕНАМ ФАЙЛОВ
  #     Правила могут распространяться по шаблонам имён,
  #     а не только по структуре папок.
  # ────────────────────────────────────────────────────────────────────

  # Все файлы с префиксом "DRAFT-" доступны только редакторам и админам
  - pattern: "**/DRAFT-*.md"
    roles: [viewer]
    permissions: [read]
    deny: true
    priority: 65

  # Все файлы "README.md" в любой папке открыты всем на чтение
  - pattern: "**/README.md"
    roles: [viewer, editor, project_manager, hr]
    permissions: [read]
    priority: 80

  # Шаблоны (templates) — только чтение для всех, кроме админа
  - pattern: "templates/**"
    roles: [editor, viewer, project_manager, hr]
    permissions: [write, delete, create]
    deny: true
    priority: 70


  # ────────────────────────────────────────────────────────────────────
  #  6. ПЕРСОНАЛЬНЫЕ ИСКЛЮЧЕНИЯ ДЛЯ КОНКРЕТНЫХ ПОЛЬЗОВАТЕЛЕЙ
  #     Правила по users имеют приоритет над ролевыми, если priority выше.
  # ────────────────────────────────────────────────────────────────────

  # Bob лично получает доступ на чтение к секретному проекту
  # (хотя его роль editor не имеет доступа к secrets/**)
  - pattern: "secrets/project-alpha/**"
    users: [bob]
    permissions: [read]
    priority: 75

  # Charlie получает право удалять файлы в проектах
  # (его роль editor этого не предусматривает)
  - pattern: "projects/**"
    users: [charlie]
    permissions: [delete]
    priority: 70

  # Eve (viewer) получает персональное право на редактирование
  # только одного конкретного файла
  - pattern: "shared/meeting-notes.md"
    users: [eve]
    permissions: [read, write]
    priority: 80

  # Dave (viewer) получает доступ к экспериментальной ветке
  - pattern: "experiments/dave/**"
    users: [dave]
    permissions: [all]
    priority: 80


  # ────────────────────────────────────────────────────────────────────
  #  7. ЗАЩИТА СИСТЕМНЫХ ФАЙЛОВ
  #     Некоторые файлы нельзя трогать никому, кроме admin.
  # ────────────────────────────────────────────────────────────────────

  # Конфигурационные файлы — защита от изменений
  - pattern: ".obsidian/**"
    roles: [editor, viewer, project_manager, hr]
    permissions: [write, delete, create]
    deny: true
    priority: 90

  # Сам файл политики ACL — защита от изменений (замкнутая петля)
  - pattern: ".vault_acl/policy.yaml"
    roles: [editor, viewer, project_manager, hr]
    permissions: [all]
    deny: true
    priority: 95
