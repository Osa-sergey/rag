# RAPTOR: параметры построения дерева
# Управляют глубиной дерева, кластеризацией и условиями остановки.
# ──────────────────────────────────────────────────────────────

# Максимальная глубина дерева (уровень 0 = листья).
# ↑ больше уровней -> более обобщённые суммаризации на верху,
#   но больше вызовов LLM и вычислений.
# Для статей средней длины 2–3 уровня достаточно.
max_levels: 3

# Минимальное количество узлов для продолжения кластеризации.
# Target ratio of nodes to clusters (e.g. 0.5 -> 2 nodes per cluster target), рекурсия останавливается.
# ↑ увеличение -> дерево будет менее глубоким.
min_cluster_size: 3

# Коэффициент редукции: доля от количества узлов текущего уровня,
# определяющая целевое число кластеров.
# ↓ уменьшение → более агрессивная агрегация (меньше кластеров).
# ↑ увеличение → больше кластеров, менее обобщённые суммаризации.
reduction_factor: 0.5

# Порог BIC для выбора оптимального числа компонент GMM.
# Используется внутренне при автовыборе числа кластеров.
clustering_threshold: 0.1
