# Chunker: Semantic
# Группирует соседние блоки по косинусному сходству эмбеддингов.
# Требует работающий embedding provider.
# ──────────────────────────────────────────────────────────────

type: semantic

# Порог косинусного сходства (0–1).
# Блоки с similarity ≥ threshold объединяются в один чанк.
# ↑ увеличение → более строгая группировка, больше мелких чанков.
# ↓ уменьшение → агрессивное слияние, меньше чанков.
similarity_threshold: 0.5

# Минимальная длина чанка в символах.
# Чанки короче будут объединены с ближайшим соседом.
min_chunk_chars: 200

# Максимальная длина чанка в символах.
max_chunk_chars: 2000
