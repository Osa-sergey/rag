# Chunker: Section-based
# Разбивает документ по заголовкам, объединяя короткие секции
# и разбивая слишком длинные с перекрытием.
# ──────────────────────────────────────────────────────────────

# Класс чанкера
_class_: raptor_pipeline.chunker.section_chunker.SectionChunker

# Минимальная длина чанка в символах.
# Секции короче этого порога будут объединены с соседними.
# ↑ увеличение → меньше чанков, больше контекста в каждом.
min_chunk_chars: 200

# Целевая длина чанка при объединении коротких секций.
# Объединение останавливается, когда буфер достигает этого размера.
target_chunk_chars: 800

# Максимальная длина чанка в символах.
# Секции длиннее этого порога будут разбиты на части.
# ↑ увеличение → меньше разбиений, но LLM получает более длинный вход.
max_chunk_chars: 2000

# Размер перекрытия при разбиении длинных секций (в символах).
# Обеспечивает контекстную связность между соседними чанками.
# ↑ увеличение → больше дублирования, но лучше связность.
overlap_chars: 100
