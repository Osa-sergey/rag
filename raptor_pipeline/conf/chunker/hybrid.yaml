# Chunker: Hybrid (Paragraph-based + Semantic)
# Уважает границы абзацев, внутри абзаца разбивает семантически.
# Гарантирует целостность предложений и соблюдение лимита длины.
# ──────────────────────────────────────────────────────────────

# Тип чанкера
type: hybrid

# Максимальная длина чанка в символах.
# Если семантический блок или абзац превышает этот предел, 
# он будет обрезан по последнему полному предложению, которое влезает.
max_chunk_chars: 2000

# Порог семантической схожести (0..1) для разбиения внутри абзаца.
# Чем выше → тем более мелкими будут семантические группы.
similarity_threshold: 0.6
