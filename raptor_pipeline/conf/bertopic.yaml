# BERTopic: параметры тематического моделирования
# Используется для извлечения ключевых слов по коллекции статей.
# ──────────────────────────────────────────────────────────────

bertopic:
  # Количество тем: "auto" или число
  n_topics: auto

  # Количество слов на тему
  top_n_words: 10

  # Минимальный размер кластера (тем с меньшим числом документов не будет)
  min_topic_size: 3
