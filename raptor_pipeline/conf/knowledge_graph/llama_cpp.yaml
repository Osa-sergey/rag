# Knowledge Graph: llama.cpp Server (Локальная LLM с полноценным батчингом)
# Извлечение ключевых слов и связей через OpenAI-совместимый API llama-server.
# ──────────────────────────────────────────────────────────────
# llama-server поддерживает continuous batching (--parallel N),
# что даёт значительный прирост скорости по сравнению с Ollama.
# ──────────────────────────────────────────────────────────────

provider: llama_cpp

# Имя модели — для логов и совместимости с ChatOpenAI.
# При работе с llama-server модель уже загружена, это поле
# передаётся в заголовке запроса, сервер его игнорирует.
model_name: gemma-3-12b-it

# URL API (llama-server по умолчанию: http://localhost:8080)
base_url: http://localhost:8080/v1

# Температура — для извлечения лучше низкая (детерминированность).
temperature: 0.1

# Максимальное количество токенов в ответе.
max_tokens: 2048

# Максимальное число ключевых слов на чанк.
max_keywords: 5

# Максимальное число связей (триплетов) на чанк.
max_relations: 10

# Порог уверенности (0–1).
confidence_threshold: 0.8
