# Knowledge Graph: LLM-based extraction
# Параметры для извлечения ключевых слов и связей из текста.
# ──────────────────────────────────────────────────────────────

# Провайдер LLM (deepseek | ollama)
provider: deepseek

# API ключ
api_key: ${oc.env:OPENROUTER_API_KEY,""}

# Модель для извлечения
model_name: deepseek/deepseek-r1

# URL API
base_url: https://openrouter.ai/api/v1

# Температура — для извлечения лучше низкая (детерминированность).
temperature: 0.1

# Максимальное количество токенов в ответе.
max_tokens: 1024

# Максимальное число ключевых слов на чанк.
# ↑ увеличение -> более полный охват, но больше шума.
max_keywords: 15

# Максимальное число связей (триплетов) на чанк.
# ↑ увеличение -> более плотный граф знаний.
max_relations: 20

# Порог уверенности (0–1).
# Ключевые слова и связи с confidence < threshold отбрасываются.
# ↑ увеличение -> только высокоуверенные извлечения.
confidence_threshold: 0.5
