# Knowledge Graph: Ollama (Локальная LLM)
# Извлечение ключевых слов и связей с использованием локальной модели.
# ──────────────────────────────────────────────────────────────

provider: ollama

# Имя модели в Ollama.
model_name: gemma3:12b

# URL API
base_url: http://localhost:11434

# Температура — для извлечения лучше низкая (детерминированность).
temperature: 0.1

# Формат ответа — JSON для структурированного вывода.
format: json

# Максимальное количество токенов в ответе.
max_tokens: 1024

# Максимальное число ключевых слов на чанк.
max_keywords: 15

# Максимальное число связей (триплетов) на чанк.
max_relations: 20

# Порог уверенности (0–1).
confidence_threshold: 0.5
