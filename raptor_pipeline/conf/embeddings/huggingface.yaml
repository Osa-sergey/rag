# Embeddings: HuggingFace (локальная модель)
# sergeyzh/BERTA — русско-английская модель, 768d, дистиллят FRIDA
# ──────────────────────────────────────────────────────────────

provider: huggingface

# Модель sentence-transformers (используется как fallback, если local_path не задан).
model_name: sergeyzh/BERTA

# Путь к локально скачанной модели.
# Если указан и директория существует — модель грузится с диска (без интернета).
# Если не указан или директория не найдена — скачивается по model_name из HuggingFace Hub.
local_path: D:/models/BERTA

# Где вычислять (cpu, cuda, mps)
model_kwargs:
  device: mps

encode_kwargs:
  normalize_embeddings: true

# Размерность выходного вектора.
# ВАЖНО: должна совпадать с vector_size в конфиге Qdrant!
embedding_dim: 768
