# Embeddings: HuggingFace (локальная модель)
# sergeyzh/BERTA — русско-английская модель, 768d, дистиллят FRIDA
# ──────────────────────────────────────────────────────────────

provider: huggingface

# Модель sentence-transformers.
model_name: sergeyzh/BERTA

# Где вычислять (cpu, cuda, mps)
model_kwargs:
  device: mps

encode_kwargs:
  normalize_embeddings: true

# Размерность выходного вектора.
# ВАЖНО: должна совпадать с vector_size в конфиге Qdrant!
embedding_dim: 768
