# Qdrant: параметры подключения к векторной базе
# ──────────────────────────────────────────────────────────────

host: localhost
port: 6333

# Имя коллекции — все уровни RAPTOR-дерева хранятся в одной коллекции.
# Уровень записывается в payload.level для фильтрации.
collection_name: raptor_chunks

# Размерность вектора — должна совпадать с embedding_dim в embeddings конфиге.
# deepseek → 1536, nomic-embed-text → 768
vector_size: 384
