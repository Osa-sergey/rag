# Summarizer: Ollama (Локальная LLM)
# Суммаризация групп чанков с использованием локально запущенной модели.
# ──────────────────────────────────────────────────────────────

provider: ollama

# Имя модели в Ollama.
model_name: gemma3:12b

# Базовый URL развернутой Ollama
base_url: http://localhost:11434

# Температура генерации (0–2).
# Рекомендуется 0.3 для суммаризации.
temperature: 0.3

# Максимальное количество токенов в ответе.
max_tokens: 1024
