# ──────────────────────────────────────────────────────────────
# Prompt: Refinement of Keywords (Deduplication & Recategorization)
# ──────────────────────────────────────────────────────────────

version: "1.0"

description: >
  Промпт для глобальной дедупликации и переранжирования извлеченных ключевых слов.

template: |
  У тебя есть сырой список ключевых слов, извлеченных из документа.
  Твоя задача — объединить синонимы, исправить опечатки, убрать мусор и назначить правильную категорию.
  
  Правила объединения:
  - Если несколько слов означают одно и то же (например: "RAG", "rag", "retrieval augmented generation", "система rag"), объедини их в один наиболее полный и правильный термин (например: "Retrieval-Augmented Generation (RAG)").
  - Исправь категорию на наиболее подходящую: technology, method, concept, tool, framework, person, organisation, metric, other.
  - Удали откровенный мусор (междометия, частицы, бессмысленные обрывки). Если удаляешь слово, в `original_words` его не включай.
  
  Верни ТОЛЬКО JSON-массив словарей:
  [
    {{
      "refined_word": "Правильный Термин",
      "category": "technology",
      "original_words": ["список", "всех", "исходных", "терминов", "которые", "объединены"]
    }}
  ]
  
  Сырые слова (формат: `слово (категория)`):
  {raw_keywords}
  
  JSON:
