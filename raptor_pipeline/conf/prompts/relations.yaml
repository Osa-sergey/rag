# ──────────────────────────────────────────────────────────────
# Prompt: Relation Extraction
# Версионируемый шаблон промпта для извлечения связей.
# Получает ключевые слова как контекст для построения триплетов.
# ──────────────────────────────────────────────────────────────

version: "1.0"

description: >
  Промпт для извлечения связей (триплетов subject-predicate-object)
  из текста. Получает список ранее извлечённых ключевых слов,
  чтобы строить связи именно между ними.

template: |
  На основе текста и списка ключевых слов извлеки
  до {max_relations} связей (триплетов) вида (subject, predicate, object).
  
  Правила:
  - subject и object ДОЛЖНЫ быть из списка ключевых слов или являться значимыми сущностями.
  - ПРИОРИТЕТ: Используй названия сущностей ровно так, как они даны в списке ключевых слов.
  - predicate — глагол или описание связи в нижнем регистре (например:
    "использует", "является частью", "основан на", "применяется в", "решает проблему").
  - Связи должны отражать реальные отношения из текста.
  - Для каждой связи укажи уверенность (0–1).
  
  Верни ТОЛЬКО JSON-массив без пояснений:
  [{"subject": "...", "predicate": "...", "object": "...", "confidence": 0.X}]
  
  Ключевые слова: {keywords}
  
  Текст:
  {text}
  
  JSON:
