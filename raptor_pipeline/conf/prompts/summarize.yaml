# ──────────────────────────────────────────────────────────────
# Prompt: Суммаризация (RAPTOR)
# Версионируемый шаблон промпта для суммаризации групп чанков.
# ──────────────────────────────────────────────────────────────

version: "1.0"

description: >
  Промпт для суммаризации группы текстовых чанков при построении
  верхних уровней RAPTOR-дерева. Резюме должно содержать ключевые
  идеи, факты и терминологию из всех входных текстов.

template: |
  Ты — аналитический ассистент. Прочитай следующие тексты,
  которые являются частями одного тематического кластера,
  и напиши краткое, но содержательное резюме.

  Требования:
  - Сохрани все ключевые идеи, факты и термины.
  - Не выдумывай информацию, которой нет в текстах.
  - Пиши на том же языке, на котором написаны тексты.
  - Резюме должно быть самодостаточным (понятным без оригиналов).

  Тексты:
  {text}

  Резюме:
