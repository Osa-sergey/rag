# ──────────────────────────────────────────────────────────────
# Prompt: Извлечение ключевых слов
# Версионируемый шаблон промпта для keyword extraction.
# ──────────────────────────────────────────────────────────────

version: "1.0"

description: >
  Промпт для извлечения ключевых слов и фраз из текстового чанка.
  Результат используется для построения графа знаний в Neo4j
  и обогащения метаданных чанков в Qdrant.

template: |
  Извлеки из текста до {max_keywords} ключевых слов или фраз.
  
  Для каждого ключевого слова укажи:
  - category: одна из (technology, method, concept, tool, framework, person, organisation, metric, other)
  - confidence: уверенность от 0 до 1
  
  Правила:
  - Выбирай термины, несущие основной смысл текста.
  - НОРМАЛИЗАЦИЯ: Пиши термины в нижнем регистре (кроме аббревиатур), в единственном числе.
  - Предпочитай специфичные термины общим словам (например, "RAG" вместо "система").
  - Сохраняй язык оригинала (если термин на русском — оставь на русском).
  
  Верни ТОЛЬКО JSON-массив без пояснений:
  [{"word": "...", "category": "...", "confidence": 0.X}]
  
  Текст:
  {text}
  
  JSON:
