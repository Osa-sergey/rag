# ===============================================================
# RAPTOR Pipeline — Master Configuration
# ===============================================================
# Все параметры модулей подключаются через defaults.
# Переопределяйте отдельные значения через CLI:
#   python -m raptor_pipeline.main embeddings.model_name=deepseek-chat
#   python -m raptor_pipeline.main chunker=semantic
# ===============================================================

defaults:
  - chunker: hybrid
  - embeddings: huggingface
  - summarizer: ollama
  - raptor: default
  - knowledge_graph: ollama
  - stores@stores.qdrant: qdrant
  - stores@stores.neo4j: neo4j
  - prompts@prompts.summarize: summarize
  - prompts@prompts.keywords: keywords
  - prompts@prompts.refine_keywords: refine_keywords
  - prompts@prompts.relations: relations
  - _self_

# ── Глобальные параметры ──────────────────────────────────────

# Директория с YAML-файлами, полученными после structurizer
input_dir: parsed_yaml

# Если указан — обработается только один файл из input_dir
input_file: null

# Уровень логирования (DEBUG / INFO / WARNING / ERROR)
log_level: INFO

# Максимальное количество параллельных запросов к LLM
max_concurrency: 4

# Показывать ли полный текст при выводе структуры дерева (используется утилитами)
full_text: false

# Фильтр по ID документа для утилит (например, inspect_tree)
article_id: null

# Конкретное ключевое слово для инспекции в inspect_graph
word: null
