defaults:
  - transcriber: gigaam
  - llm: llama_cpp
  - embeddings: huggingface
  - database: postgresql
  - categories: default
  - telegram: default
  - firefly: default
  - obsidian: default
  - intents: default
  - _self_

log_level: INFO
