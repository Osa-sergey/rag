# ─── Firefly III Connection ───────────────────────────────────
# URL и токен для Firefly III API
# Токен создаётся в Firefly: Profile → OAuth → Personal Access Tokens

base_url: "http://localhost:9090"
token: "${oc.env:FIREFLY_TOKEN,}"

# Счёт по умолчанию (если пользователь не указал)
default_source_account: "Сбер расчетный счет"

# Синонимы для счетов — позволяют говорить "сбер" вместо полного имени
account_synonyms:
  synonyms:
    # Сбербанк
    сбер: "Сбер расчетный счет"
    сбербанк: "Сбер расчетный счет"
    зарплатная: "Сбер расчетный счет"
    сбер накопительный: "Сбер накопительный счет общий"
    сбер вспомогательный: "Сбер накопительный счет вспомогательный"
    сбер ипотека: "Сбер ипотека"
    мамин счёт: "Сбер совместный счет мама"
    анин счёт: "Сбер совместный счет аня"

    # Альфа-банк
    альфа: "Альфа расчетный счет"
    альфабанк: "Альфа расчетный счет"

    # Тинькофф
    тинькофф: "Тинькофф расчетный счет"
    тиньков: "Тинькофф расчетный счет"
    тинёк: "Тинькофф расчетный счет"

    # Наличные
    наличка: "Наличка"
    наличные: "Наличка"
    нал: "Наличка"
    кэш: "Наличка"

    # Копилки
    копилка: "Копилки"
    копилки: "Копилки"
