services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: raptor_qdrant
    ports:
      - "6333:6333"   # REST API + Dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: raptor_neo4j
    ports:
      - "7474:7474"   # HTTP (Browser UI)
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/raptor_password
      NEO4J_PLUGINS: '["apoc"]'
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
