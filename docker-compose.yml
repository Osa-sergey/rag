services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: raptor_qdrant
    ports:
      - "6333:6333" # REST API + Dashboard
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: raptor_neo4j
    ports:
      - "7474:7474" # HTTP (Browser UI)
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/raptor_password
      NEO4J_PLUGINS: '["apoc"]'
    restart: unless-stopped

  # ── Document-oriented DBs ──────────────────────────────────
  postgres:
    image: postgres:16
    container_name: tutorial_postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student_pass
      POSTGRES_DB: doc_tutorial
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tutorial_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tutorial.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
    depends_on:
      - postgres
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: tutorial_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: student
      MONGO_INITDB_ROOT_PASSWORD: student_pass
      MONGO_INITDB_DATABASE: doc_tutorial
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: tutorial_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: student
      ME_CONFIG_MONGODB_ADMINPASSWORD: student_pass
      ME_CONFIG_MONGODB_URL: mongodb://student:student_pass@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Redis Stack (Redis + RedisJSON + RediSearch + RedisInsight) ──
  redis-stack:
    image: redis/redis-stack:latest
    container_name: tutorial_redis
    ports:
      - "6379:6379" # Redis protocol
      - "8001:8001" # RedisInsight UI
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  pg_data:
  mongo_data:
  redis_data:
